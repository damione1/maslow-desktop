name: Release

# Builds installers on every version tag and attaches them to a GitHub Release.
#   git tag v0.1.0 && git push origin v0.1.0
#
# Desktop (macOS / Windows / Linux) works with no secrets — it just ships
# unsigned artifacts. Code signing + the mobile jobs are opt-in: set the repo
# variable BUILD_MOBILE=true and add the secrets listed in the README/below.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Desktop: macOS (Apple Silicon + Intel), Windows, Linux. Creates the draft
  # release that the mobile jobs later upload into.
  # ---------------------------------------------------------------------------
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (optional — leave unset to ship unsigned)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Maslow Desktop ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ---------------------------------------------------------------------------
  # Android: builds a signed APK (sideloadable) and uploads it to the release.
  # Opt-in: needs BUILD_MOBILE=true + the ANDROID_* signing secrets.
  # ---------------------------------------------------------------------------
  android:
    needs: desktop
    if: ${{ vars.BUILD_MOBILE == 'true' }}
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Build APK
        run: npm run tauri android build -- --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/universal/release"
          UNSIGNED=$(ls "$APK_DIR"/*-unsigned.apk)
          "$BUILD_TOOLS/zipalign" -f 4 "$UNSIGNED" "$APK_DIR/aligned.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/keystore.jks" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$RUNNER_TEMP/maslow-desktop-${{ github.ref_name }}.apk" \
            "$APK_DIR/aligned.apk"

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$RUNNER_TEMP/maslow-desktop-${{ github.ref_name }}.apk" --clobber

  # ---------------------------------------------------------------------------
  # iOS: builds a signed .ipa. NOTE: an .ipa on a GitHub release is only
  # installable on devices registered in the provisioning profile (ad-hoc /
  # release-testing). Real public distribution = TestFlight / App Store.
  # Opt-in: needs BUILD_MOBILE=true + the APPLE_* / IOS_* secrets.
  # ---------------------------------------------------------------------------
  ios:
    needs: desktop
    if: ${{ vars.BUILD_MOBILE == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project
        run: npm run tauri ios init

      - name: Build IPA
        run: npm run tauri ios build -- --export-method release-testing
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload IPA to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IPA=$(find src-tauri/gen/apple/build -name "*.ipa" | head -n 1)
          gh release upload "${{ github.ref_name }}" "$IPA" --clobber
