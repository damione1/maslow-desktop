name: Release

# Builds installers on every version tag and attaches them to a GitHub Release.
#   git tag v0.1.0 && git push origin v0.1.0
#
# Desktop (macOS / Windows) works with no secrets — it just ships unsigned
# artifacts. Code signing + the Android job are opt-in: set the repo variable
# BUILD_MOBILE=true and add the secrets listed below.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Desktop: macOS (Apple Silicon + Intel) and Windows. Creates the draft
  # release that the Android job later uploads into.
  # ---------------------------------------------------------------------------
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Set app version from tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          export VERSION="${TAG#v}"
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p));c.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"
          echo "Built version set to $VERSION"
        # The installer version comes from tauri.conf.json. We overwrite it from
        # the tag here so the tag is the single source of truth for the release.

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (optional — leave unset to ship unsigned)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Maslow Desktop ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform below.

            Tested firmware: FluidNC v1.21 to v1.22. Connecting to a Maslow outside that range still works, but the app shows an "untested firmware" warning and some behaviour may differ.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ---------------------------------------------------------------------------
  # Android: builds a signed APK (sideloadable) and uploads it to the release.
  # Opt-in: needs BUILD_MOBILE=true + the ANDROID_* signing secrets.
  # ---------------------------------------------------------------------------
  android:
    needs: desktop
    if: ${{ vars.BUILD_MOBILE == 'true' }}
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Set app version from tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          export VERSION="${TAG#v}"
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p));c.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"
          echo "Built version set to $VERSION"

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Build APK
        run: npm run tauri android build -- --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/universal/release"
          UNSIGNED=$(ls "$APK_DIR"/*-unsigned.apk)
          "$BUILD_TOOLS/zipalign" -f 4 "$UNSIGNED" "$APK_DIR/aligned.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/keystore.jks" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$RUNNER_TEMP/maslow-desktop-${{ github.ref_name }}.apk" \
            "$APK_DIR/aligned.apk"

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$RUNNER_TEMP/maslow-desktop-${{ github.ref_name }}.apk" --clobber
